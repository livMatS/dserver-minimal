name: generic-container-image-publication

on:
  workflow_call:
    inputs:
      image:
        description: 'Full name of container image to build, without tag'
        default: 'ghcr.io/jic-dtool/dserver-single-container'
        required: false
        type: string
      docker_file:
        description: 'Path to dockerfile within repository of calling workflow'
        default: 'docker/single-container/Dockerfile'
        required: false
        type: string
      docker_context:
        description: 'Context for building docker image'
        default: 'docker/single-container'
        required: false
        type: string
      registry:
        description: 'Registry to push docker image to'
        default: 'ghcr.io'
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@v5.8.0
      with:
        images: ${{ inputs.image }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=ref,event=branch
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up docker buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.docker_file }}
        platforms: linux/amd64,linux/arm64
        push: |
          ${{ (github.event_name == 'workflow_dispatch') ||
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) ||
              (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
              (
                github.event_name == 'pull_request' && 
                github.event.action == 'closed' && 
                github.event.pull_request.base.ref == 'main' && 
                github.event.pull_request.merged == true
              ) }}
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        # GitHub Actions cache backend — no manual pruning needed.
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}
