name: publish-python-package

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build:

    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC): no long-lived PyPI token needed. Requires a
    # trusted publisher configured for this repo/workflow on both PyPI and
    # TestPyPI (https://docs.pypi.org/trusted-publishers/).
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install requirements
      run: |
        pip install --upgrade build
        pip install --upgrade setuptools wheel setuptools-scm[toml]
        pip list

    - name: Package distribution
      run: |
        python -m build

    - name: Publish distribution to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
        skip-existing: true

    - name: Publish distribution to PyPI
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
