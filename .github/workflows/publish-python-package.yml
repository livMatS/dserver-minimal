name: publish-python-package

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install requirements
      run: |
        pip install --upgrade build
        pip install --upgrade setuptools wheel setuptools-scm[toml]
        pip list

    - name: Package distribution
      run: python -m build

    - name: Upload distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  # Trusted Publishing (OIDC): no long-lived PyPI token needed. Each publish job
  # runs in a GitHub environment whose name must match the trusted publisher
  # configured on (Test)PyPI. See https://docs.pypi.org/trusted-publishers/.
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
    - name: Download distribution artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish distribution to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
        skip-existing: true

  publish-pypi:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - name: Download distribution artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
