server {
    listen      8888;
    server_name localhost;

    # dserver REST API. The /lookup prefix is preserved (not stripped) because
    # dserver runs with SCRIPT_NAME=/lookup and mounts itself under that path.
    location /lookup {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5000;
    }

    # Static web GUI built at image-build time. try_files falls back to
    # index.html so client-side routes resolve.
    location / {
        root      /var/www/dtool-lookup-webapp;
        try_files $uri $uri/ /index.html;
    }
}
