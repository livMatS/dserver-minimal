[supervisord]
nodaemon=true
user=root

; priority controls start order: databases first, then one-shot init, then the
; API, then nginx. dserver/nginx autorestart=true so they recover from the
; brief window before init finishes.

[program:postgresql]
command=/usr/lib/postgresql/%(ENV_PG_VERSION)s/bin/postgres -D /var/lib/postgresql/%(ENV_PG_VERSION)s/main -c config_file=/etc/postgresql/%(ENV_PG_VERSION)s/main/postgresql.conf
user=postgres
priority=10
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:mongodb]
command=/usr/bin/mongod --bind_ip 0.0.0.0 --dbpath /data/db
user=mongodb
priority=10
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; One-shot bootstrap: waits for the databases, applies migrations, seeds the
; test user and base URI, indexes mounted datasets. exitcodes=0 + the script's
; idempotency mean a successful run leaves it stopped (not relaunched).
[program:prepare-dserver]
command=/prepare-dserver.sh
directory=/dserver
priority=20
autostart=true
autorestart=unexpected
startretries=5
startsecs=0
exitcodes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:dserver]
directory=/dserver
command=gunicorn -b 127.0.0.1:5000 --access-logfile - --error-logfile - --log-level %(ENV_LOGLEVEL)s wsgi:app
priority=30
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
priority=40
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
